<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#8a8a8a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

/* ===== 工具列：模式切換＋（卡牌）篩選（只在螢幕；列印隱藏）===== */
#topbar{position:sticky;top:0;z-index:50;background:#141417;color:#fff;padding:8px 14px;box-shadow:0 2px 12px rgba(0,0,0,.4);}
#toprow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.seg{display:flex;background:#2a2a30;border-radius:8px;overflow:hidden;}
.seg button{background:transparent;color:#bbb;border:0;padding:7px 18px;font:600 14px 'Noto Sans TC',sans-serif;cursor:pointer;}
.seg button.on{background:#6b6bff;color:#fff;}
#tcount{font-size:13px;opacity:.85;}
.hint{margin-left:auto;font-size:12px;opacity:.55;}
#filters{margin-top:7px;}
#filters.hide{display:none;}
#filters .row{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:4px 0;}
#filters .lbl{flex:0 0 58px;font-size:12px;opacity:.6;}
#fclear{font-size:12px;color:#9cf;cursor:pointer;text-decoration:underline;margin-left:6px;}
.chip{font-family:inherit;font-size:12px;line-height:1;padding:5px 9px;border-radius:13px;border:1px solid #5a5a5a;background:transparent;color:#ddd;cursor:pointer;white-space:nowrap;}
.chip:hover{border-color:#9a9a9a;}
.chip.on{background:#ececec;color:#111;border-color:#ececec;font-weight:500;}
.chip .c{opacity:.5;margin-left:4px;font-size:11px;}

<style>
/* 卡特呈現 · 卡牌公版＋特性板「呈現樣式」單一來源
   熱修窗（工作台/index.html）與發布（發布/列印.html）共用同一份，避免兩邊版型漂移：
   - 熱修窗：server.js 服務本檔，index.html 用 link 標籤載入。
   - 發布：build.js 把本檔內嵌進烤好的頁面（自帶樣式、無伺服器）。
   只放「卡面／特性板的呈現規則」；各頁外層 chrome（工具列／篩選／lint／列印方向／手機橫移）仍在各自 HTML。
   （注意：本檔不在熱修輪詢的監看清單，改它後手動刷新瀏覽器才看得到。） */

/* ===== 卡牌公版（風格 B）===== */
.sheet{width:297mm;height:210mm;background:#fff;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);box-shadow:0 4px 24px rgba(0,0,0,.35);}
.cb{width:100%;height:100%;background:#fff;position:relative;overflow:hidden;color:#111;padding:2.5mm;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.cb-frame{width:100%;height:100%;border:0.3mm solid #111;display:flex;flex-direction:column;padding:2mm;gap:1.5mm;overflow:hidden;}
.cb-title{position:relative;background:#111;color:#fff;height:8mm;display:flex;align-items:center;gap:1.5mm;padding:0 1.6mm;flex:0 0 auto;font-family:'Noto Serif TC',serif;}
.cb-cost{flex:0 0 auto;width:6.6mm;height:6.6mm;border-radius:50%;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;}
.cb-cost span{font-size:15px;font-weight:700;line-height:1;}
.cb-name{flex:1;text-align:center;font-size:14px;font-weight:700;letter-spacing:1.5px;line-height:1;white-space:nowrap;overflow:hidden;}
.cb-type{flex:0 0 auto;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:0.5px;line-height:1.25;text-align:right;white-space:nowrap;color:#e6e6e6;}
.cb-art{flex:0 0 auto;border:0.3mm solid #111;background:repeating-linear-gradient(-45deg,#efefef 0,#efefef 1.6mm,#ffffff 1.6mm,#ffffff 3.2mm);display:flex;align-items:center;justify-content:center;}
.cb-art span{font-family:'IBM Plex Mono',monospace;font-size:6.5px;letter-spacing:1px;color:#888;background:#fff;padding:0.6mm 1.6mm;}
.cb-body{flex:1;min-height:0;overflow:hidden;font-family:'Noto Sans TC',sans-serif;color:#111;font-size:12px;line-height:1.4;display:flex;flex-direction:column;justify-content:flex-end;gap:0.5em;}
.cb-outs{display:flex;flex-direction:column;gap:0.16em;}
.cb-out{display:flex;align-items:center;gap:0.5em;}
.cb-mark{flex:0 0 auto;width:1.1mm;height:1.05em;}
.cb-mark.crit{background:#111;}
.cb-mark.norm{background:#bdbdbd;}
.cb-olabel{flex:0 0 4.3em;font-family:'Noto Serif TC',serif;font-weight:700;line-height:1.1;}
.cb-otext{flex:1;}
.cb-res{border:0.3mm solid #111;display:flex;flex-direction:column;}
.cb-reshead{background:#111;color:#fff;display:flex;align-items:baseline;gap:0.6em;padding:0.25em 0.55em;}
.cb-restag{font-family:'Noto Serif TC',serif;font-weight:700;line-height:1;}
.cb-ressub{font-size:0.72em;letter-spacing:0.5px;}
.cb-resbody{padding:0.5em 0.55em;display:flex;flex-direction:column;gap:0.28em;}
.cb-item{display:flex;gap:0.45em;}
.cb-marker{flex:0 0 auto;font-weight:700;}
.cb-itext{flex:1;}

/* ===== 特性板 ===== */
.page{position:relative;width:210mm;height:297mm;background:#fff;overflow:hidden;display:grid;grid-template-rows:repeat(2,1fr);box-shadow:0 4px 24px rgba(0,0,0,.35);}
.cutline{position:absolute;left:0;right:0;top:50%;height:0;border-top:0.2mm dashed #b0b0b0;pointer-events:none;}
.tb{width:100%;height:100%;background:#fff;position:relative;overflow:hidden;color:#111;padding:3.5mm;font-family:'Noto Sans TC',sans-serif;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.tb-frame{width:100%;height:100%;border:0.3mm solid #111;display:flex;flex-direction:column;padding:2.8mm;gap:2.6mm;overflow:hidden;}
.tb-title{position:relative;background:#111;color:#fff;height:12mm;display:flex;align-items:center;gap:2.6mm;padding:0 3mm;flex:0 0 auto;font-family:'Noto Serif TC',serif;}
.tb-mark{flex:0 0 auto;width:8.4mm;height:8.4mm;border-radius:50%;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;}
.tb-mark span{font-size:17px;font-weight:700;line-height:1;}
.tb-namewrap{flex:0 0 auto;display:flex;align-items:baseline;gap:2.4mm;min-width:0;}
.tb-name{font-size:23px;font-weight:700;letter-spacing:3px;line-height:1;white-space:nowrap;}
.tb-sub{font-family:'Noto Sans TC',sans-serif;font-size:8px;font-weight:500;letter-spacing:2px;line-height:1.2;color:#cfcfcf;white-space:nowrap;}
.tb-spacer{flex:1;}
.tb-code{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:1px;line-height:1;color:#bdbdbd;text-align:right;}
.tb-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:row;gap:2.6mm;font-size:14px;line-height:1.5;color:#111;}
.tb-colbase{flex:1.05 1 0;min-width:0;border:0.4mm solid #111;display:flex;flex-direction:column;}
.tb-colbranch{flex:1 1 0;min-width:0;border:0.3mm solid #111;display:flex;flex-direction:column;}
.tb-colhead{background:#111;color:#fff;display:flex;align-items:center;gap:0.7em;padding:0.4em 0.8em;font-family:'Noto Serif TC',serif;flex:0 0 auto;}
.tb-colhead .lbl{flex:0 0 auto;font-size:0.62em;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;color:#bdbdbd;}
.tb-colhead .ttl{font-weight:700;letter-spacing:1px;line-height:1.15;}
.tb-tag{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-size:0.66em;font-weight:500;letter-spacing:0.5px;color:#111;background:#fff;padding:0.18em 0.5em;line-height:1;}
.tb-fit{flex:1;min-height:0;overflow:hidden;padding:0.75em 0.9em;display:flex;flex-direction:column;justify-content:flex-start;gap:0.6em;}
.tb-subblock{display:flex;flex-direction:column;gap:0.42em;}
.tb-sublabel{font-family:'Noto Serif TC',serif;font-weight:700;line-height:1.2;border-bottom:0.2mm solid #111;padding-bottom:0.12em;}
.tb-item{display:flex;gap:0.5em;align-items:baseline;}
.tb-item .mk{flex:0 0 auto;font-family:'Noto Serif TC',serif;font-weight:700;}
.tb-item .tx{flex:1;}

</style>

<body>
<div id="topbar">
  <div id="toprow">
    <div class="seg"><button id="m-card" class="on">卡牌</button><button id="m-trait">特性</button></div>
    <span id="tcount"></span>
    <span class="hint">切換模式後 Ctrl+P 列印（卡牌＝橫、特性＝直，方向自動）</span>
  </div>
  <div id="filters">
    <div class="row"><span class="lbl">卡牌</span><span id="g-type"></span><span id="fclear">清除</span></div>
    <div class="row"><span class="lbl">火線</span><span id="g-fire"></span></div>
    <div class="row"><span class="lbl">狀態效果</span><span id="g-status"></span></div>
    <div class="row"><span class="lbl">機制</span><span id="g-mech"></span></div>
  </div>
</div>
<div class="stage" id="stage"></div>

<script>
// 卡片內文解析 + 卡面 DOM 產生（瀏覽器端共用權威版）。
// 卡牌列印 與 卡牌閱讀 共用同一份，避免兩份 drift。各自 build.js 會把本檔內嵌進 dist。
// 不依賴版面——只負責「卡資料 → 語意區塊 → .cb 卡面 DOM」；放大／A4／流式排版由各工具的 CSS 決定。
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function parseInline(str){if(str==null)return[];str=String(str).replace(/\\([+\-|()\[\]])/g,'$1');var out=[];str.split('**').forEach(function(part,i){var bb=i%2===1;part.split(/(【[^】]*】)/).forEach(function(s){if(!s)return;var kw=/^【[^】]*】$/.test(s);var b=bb||kw;out.push({t:s,b:b});});});return out;}
function segs(s){return parseInline(s).map(function(g){return g.b?'<b>'+esc(g.t)+'</b>':'<span>'+esc(g.t)+'</span>';}).join('');}

function parseBody(body){
  var lines=String(body||'').split('\n').map(function(s){return s.replace(/\s+$/,'').trim();}).filter(Boolean);
  var blocks=[],inRes=false,resObj=null,curOut=null;
  lines.forEach(function(line){
    var l=line.replace(/^\*\s+/,'');
    if(inRes){resObj.items.push(l);return;}
    if(/持續期間/.test(line)){var h=line.replace(/\*\*/g,'').replace(/[:：]\s*$/,'');var p=h.split('｜');resObj={tag:(p[0]||'保留').trim(),sub:(p[1]||'').replace(/[:：]\s*$/,'').trim(),items:[]};blocks.push({reserve:resObj});inRes=true;curOut=null;return;}
    var mm=/^(大成功|大失敗|失敗|成功)\s*[:：]\s*([\s\S]*)$/.exec(l);
    if(mm){if(!curOut){curOut={outcomes:[]};blocks.push(curOut);}curOut.outcomes.push({label:mm[1],text:mm[2],crit:(mm[1]==='大成功')});return;}
    curOut=null;blocks.push({p:l});
  });
  return blocks;
}

function para(p){return'<div>'+segs(p)+'</div>';}
function outs(items){return'<div class="cb-outs">'+items.map(function(o){return'<div class="cb-out"><div class="cb-mark '+(o.crit?'crit':'norm')+'"></div><div class="cb-olabel">'+esc(o.label)+'</div><div class="cb-otext">'+segs(o.text)+'</div></div>';}).join('')+'</div>';}
function res(r){var its=r.items.map(function(t){var mk=/^([①②③④⑤⑥⑦⑧⑨])/.exec(t);return mk?'<div class="cb-item"><span class="cb-marker">'+esc(mk[1])+'</span><div class="cb-itext">'+segs(t.slice(1))+'</div></div>':'<div class="cb-item"><div class="cb-itext">'+segs(t)+'</div></div>';}).join('');return'<div class="cb-res"><div class="cb-reshead"><span class="cb-restag">'+esc(r.tag)+'</span><span class="cb-ressub">'+esc(r.sub)+'</span></div><div class="cb-resbody">'+its+'</div></div>';}
function block(b){if(b.p!==undefined)return para(b.p);if(b.outcomes)return outs(b.outcomes);if(b.reserve)return res(b.reserve);return'';}
function card(c){
  var tr=[c.type,c.subtype].filter(Boolean).join(' · ');
  var artH=(c.artH===undefined?46:c.artH);
  var art=artH>0?'<div class="cb-art" style="height:'+artH+'mm"><span>插圖 · ART</span></div>':'';
  var body=parseBody(c.body).map(block).join('');
  return'<div class="cb"><div class="cb-frame"><div class="cb-title"><div class="cb-cost"><span>'+esc(c.cost)+'</span></div><div class="cb-name">'+esc(c.title)+'</div><div class="cb-type">'+esc(tr)+'</div></div>'+art+'<div class="cb-body">'+body+'</div></div></div>';
}

</script>
<script>
// 卡牌篩選邏輯（瀏覽器端共用權威版）——卡牌列印 與 卡牌閱讀 共用，避免 drift。
// 只負責「資料 → 篩選模型／判定」；篩選 UI（chip 外觀、收合行為）由各工具自行套樣式。
// buildFilterModel(CARDS,VOCAB) → { sets, groups }；cardPasses(card, sel, sets) → bool。
function buildFilterModel(CARDS, VOCAB){
  VOCAB = VOCAB || {};
  var statusSet={}, mechSet={}, summonSet={};
  (VOCAB.status||[]).forEach(function(t){statusSet[t]=1;});
  (VOCAB.mech||[]).forEach(function(t){mechSet[t]=1;});
  (VOCAB.summon||[]).forEach(function(t){summonSet[t]=1;});
  var sets={status:statusSet, mech:mechSet, summon:summonSet};

  function countBy(key){var m={};CARDS.forEach(function(c){var v=c[key]||'';if(v)m[v]=(m[v]||0)+1;});return m;}
  function ordered(map,pref){return Object.keys(map).sort(function(a,b){var ia=pref.indexOf(a),ib=pref.indexOf(b);ia=ia<0?99:ia;ib=ib<0?99:ib;return ia-ib||map[b]-map[a]||a.localeCompare(b,'zh-Hant');});}
  var tagCount={};CARDS.forEach(function(c){(c.tags||[]).forEach(function(t){tagCount[t]=(tagCount[t]||0)+1;});});
  function tagCat(t){return statusSet[t]?'status':(summonSet[t]?'summon':'mech');}
  function tagsOf(cat){return Object.keys(tagCount).filter(function(t){return tagCat(t)===cat;}).sort(function(a,b){return tagCount[b]-tagCount[a]||a.localeCompare(b,'zh-Hant');});}
  function mk(values,countMap){return values.map(function(v){return {val:v,count:countMap[v]};});}

  var typeCount=countBy('type'), fireCount=countBy('subtype');
  var summonCount=CARDS.filter(function(c){return (c.tags||[]).some(function(t){return summonSet[t];});}).length;
  var mechVals=tagsOf('mech'); var mechCountMap={}; mechVals.forEach(function(v){mechCountMap[v]=tagCount[v];});
  if(summonCount){ mechVals=mechVals.concat(['召喚物']); mechCountMap['召喚物']=summonCount; }

  var groups=[
    {dim:'type',   label:'卡牌',     chips:mk(ordered(typeCount,['行動','反應','祕密','召喚物']), typeCount)},
    {dim:'fire',   label:'火線',     chips:mk(ordered(fireCount,['近戰','遠程','混合','自身']), fireCount)},
    {dim:'status', label:'狀態效果', chips:mk(tagsOf('status'), tagCount)},
    {dim:'mech',   label:'機制',     chips:mk(mechVals, mechCountMap)}
  ];
  return {sets:sets, groups:groups};
}

function cardPasses(c, sel, sets){
  function selOn(o){for(var k in o)if(o[k])return true;return false;}
  if(selOn(sel.type) && !sel.type[c.type]) return false;
  if(selOn(sel.fire) && !sel.fire[c.subtype]) return false;
  var tg=c.tags||[];
  if(selOn(sel.status) && !tg.some(function(t){return sel.status[t];})) return false;
  if(selOn(sel.mech)){
    var hit=false;
    for(var v in sel.mech){ if(!sel.mech[v]) continue;
      if(v==='召喚物'){ if(tg.some(function(t){return sets.summon[t];})){hit=true;break;} }
      else if(tg.indexOf(v)>=0){ hit=true; break; }
    }
    if(!hit) return false;
  }
  return true;
}

</script>
<script>
// 特性卡面渲染（瀏覽器端共用權威版）。特性列印 與 實體化工作台 共用，避免 drift。
// 命名空間 window.TRAIT，內部自帶 esc/parseInline/segs（特性版需處理 [[wikilink]]，與卡牌不同），
// 故刻意「不」用全域 esc/parseInline，避免與 card-parse.js 的全域同名函式衝突。
window.TRAIT = (function(){
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  function parseInline(str){
    if(str==null)return[];
    str=String(str)
      .replace(/\[\[[^\]|]+\|([^\]]+)\]\]/g,'$1')   // [[目標|別名]] → 別名
      .replace(/\[\[([^\]]+)\]\]/g,'$1')            // [[目標]] → 目標
      .replace(/\\([+\-|()\[\]])/g,'$1');           // 去 markdown 轉義
    var out=[];
    str.split('**').forEach(function(part,i){
      var bb=i%2===1;
      part.split(/(【[^】]*】)/).forEach(function(s){
        if(!s)return;var kw=/^【[^】]*】$/.test(s);var b=bb||kw;out.push({t:s,b:b});
      });
    });
    return out;
  }
  function segs(s){return parseInline(s).map(function(g){return g.b?'<b>'+esc(g.t)+'</b>':'<span>'+esc(g.t)+'</span>';}).join('');}
  function itemHtml(line){
    var m=/^\s*([①②③④⑤⑥⑦⑧⑨])\s*/.exec(line);
    if(m)return'<div class="tb-item"><span class="mk">'+esc(m[1])+'</span><div class="tx">'+segs(line.slice(m[0].length))+'</div></div>';
    var d=/^\s*[-－]\s+/.exec(line);
    if(d)return'<div class="tb-item"><span class="mk">·</span><div class="tx">'+segs(line.slice(d[0].length))+'</div></div>';
    return'<div class="tb-item"><div class="tx">'+segs(line)+'</div></div>';
  }
  function itemsHtml(lines){return(lines||[]).map(itemHtml).join('');}

  function boardHtml(trait,branch){
    var roleMark=(trait.name||'◆').slice(0,1);
    var sub=trait.oneliner||'特性板';
    var base=trait.base||{title:'',subs:[]};
    var baseInner=(base.subs||[]).map(function(s){
      return'<div class="tb-subblock"><div class="tb-sublabel">'+esc(s.label)+'</div>'+itemsHtml(s.items)+'</div>';
    }).join('');
    var branchInner=branch?(
      '<div class="tb-colhead"><span class="tb-tag">'+esc(branch.tag)+'</span><span class="lbl">分支</span><span class="ttl">'+esc(branch.title)+'</span></div>'+
      '<div class="tb-fit" data-fitblock>'+itemsHtml(branch.items)+'</div>'
    ):'<div class="tb-colhead"><span class="lbl">分支</span></div><div class="tb-fit" data-fitblock></div>';
    return'<div class="tb"><div class="tb-frame">'
      +'<div class="tb-title"><div class="tb-mark"><span>'+esc(roleMark)+'</span></div>'
      +'<div class="tb-namewrap"><div class="tb-name">'+esc(trait.name||'')+'</div><div class="tb-sub">'+esc(sub)+'</div></div>'
      +'<div class="tb-spacer"></div><div class="tb-code">'+esc(branch?('路線 '+branch.tag):'')+'</div></div>'
      +'<div class="tb-body">'
      +'<div class="tb-colbase"><div class="tb-colhead"><span class="lbl">特性</span><span class="ttl">'+esc(base.title)+'</span></div><div class="tb-fit" data-fitblock>'+baseInner+'</div></div>'
      +'<div class="tb-colbranch">'+branchInner+'</div>'
      +'</div></div></div>';
  }
  function pageHtml(trait){
    var b=trait.branches||[];
    return'<div class="page">'+boardHtml(trait,b[0]||null)+boardHtml(trait,b[1]||null)+'<div class="cutline"></div></div>';
  }

  function renderInto(stageEl, TRAITS){
    TRAITS=TRAITS||[];
    var html='';
    TRAITS.forEach(function(t,i){
      html+='<div class="cap">第 '+(i+1)+' / '+TRAITS.length+' 張 A4　·　'+esc(t.name)+'（上＝A＋B1、下＝A＋B2）</div>';
      html+=pageHtml(t);
    });
    if(!TRAITS.length)html='<div class="cap">讀不到特性</div>';
    stageEl.innerHTML=html;
  }
  function fit(){
    Array.prototype.forEach.call(document.querySelectorAll('.tb-body'),function(body){
      var fs=14;body.style.fontSize=fs+'px';
      var blocks=body.querySelectorAll('[data-fitblock]');
      function over(){for(var i=0;i<blocks.length;i++){if(blocks[i].scrollHeight>blocks[i].clientHeight+0.5)return true;}return false;}
      var g=160;
      while(over()&&fs>8&&g-->0){fs-=0.2;body.style.fontSize=fs+'px';}
    });
  }
  return { renderInto: renderInto, fit: fit, pageHtml: pageHtml };
})();

:["修正","移動"],"body":"你對**範圍2內**的**一名其他單位**進行檢定(技+智)，**擲骰前**可宣告**消耗** 1 點**基礎移動**使**修正 +2**;可重複消耗:\n* 失敗:**解除**目標身上**負面狀態** 1 次\n* 成功:**解除**目標身上**負面狀態** 2 次  \n* 大成功:**解除**目標身上**負面狀態** 3 次"},{"cost":"1","title":"療癒之曲","type":"行動","subtype":"混合","tags":["修正","恢復生命","移動","臨時生命"],"body":"你對**範圍2內**的**一名其他單位**進行檢定(技+智)，**擲骰前**可宣告**消耗** 1 點**基礎移動**使**修正 +2**;可重複消耗:\n* 失敗:**恢復** 1 點**生命**  \n* 成功:**恢復** 2 點**生命**  \n* 大成功:**恢復** 2 點**生命** 且獲得**臨時生命1**(可以疊加)"},{"cost":"1","title":"調音","type":"反應","subtype":"遠程","tags":["保留"],"body":"當你**範圍2內**的**其他單位**【擲骰後】可重擲其骰最多 2 次（每次 1 顆），你決定是否保留。\n\n【技能結束後】可**額外消耗** 1 點 **COST**，**重新選擇** 1 顆骰子**重擲**；可重複消耗。"},{"cost":"2","title":"餘音繞樑","type":"行動","subtype":"遠程","tags":["振奮","保留","地標"],"body":"你在**範圍3內**的任意個地塊**創造** 1 枚**地標**，隨後此卡進入保留。\n\n**保留2**｜持續期間:\n①地標**範圍1內**的**所有我方**單位獲得【振奮】，離開範圍則解除。\n②【我方回合結束時】地標**範圍1內**的單位**總計恢復最多** 2 點**生命**（由你自由分配）。\n【解除保留時】移除地標"},{"cost":"1","title":"陰險地沼","type":"行動","subtype":"遠程","tags":["保留","地標"],"body":"你在**範圍3內**的任意地塊**創造** 1 枚**地標**，隨後此卡進入保留。\n\n**保留1**｜持續期間:\n地標所在的**地塊**視為**困難地形**。\n【解除保留時】移除地標。"},{"cost":"2","title":"靜謐孢幕","type":"行動","subtype":"自身","tags":["保留","失去生命","臨時生命"],"body":"你獲得**臨時生命4**，此卡**進入保留**。\n\n**保留2**｜持續期間: \n①你**範圍1內**的**所有我方**單位**對抗門檻 +1**\n②你**範圍1內**的**所有我方**單位【失去生命時】優先減少你的**臨時生命**。\n當你**臨時生命歸零**時 → **解除保留**此卡。"},{"cost":"1","title":"星穹矩陣","type":"行動","subtype":"遠程","tags":["保留","地標","瞬移"],"body":"你在**範圍3內**的任意地塊**創造** 1 枚**地標**，隨後進入保留。\n\n**保留1**｜持續期間:\n①【我方回合結束時】你可使該地標【瞬移1】。\n②【我方回合結束時】地標**範圍1內**的**所有單位**最多**失去** 「1d智慧的一半」 點**生命**（由你自由分配）。\n【解除保留時】移除地標。"},{"cost":"2","title":"英勇戰歌","type":"行動","subtype":"遠程","tags":["振奮","保留","牽引","臨時生命"],"body":"你對**範圍2內**的**其他所有我方**單位【牽引1】，且獲得**臨時生命2**，隨後**進入保留**。\n\n**保留1**｜持續期間:\n你**範圍2內**的單位獲得【振奮】，離開範圍則解除。"},{"cost":"2","title":"戰神裁決","type":"行動","subtype":"近戰","tags":["恐懼"],"body":"當你**範圍1內**的**一名**單位**生命低於四分之一**(向下取整)，你可以使其**立刻死亡**，並對你**範圍3內**的**所有敵方**單位造成【恐懼】。"},{"cost":"1","title":"戰場解析","type":"行動","subtype":"自身","tags":["保留","劣勢"],"body":"此卡**進入保留**。\n\n**保留1**｜持續期間:\n* ①你的**檢定**不會在你**範圍3內**因**掩體線**、**高地線**和**單位**而劣勢\n* ②你的**火線**不會在你**範圍3內**受**高地線**阻擋"},{"cost":"2","title":"渾身蓄力","type":"行動","subtype":"自身","tags":["保留","優勢"],"body":"此卡進入保留。\n\n**保留2**｜持續期間:\n* ①你的**對抗門檻 + 2**  \n* ②你**無法**施放**任何技能**\n【無法主動解除保留】\n\n【我方回合開始時】解除保留此卡，若本回合**首個施放**的技能是**檢定技能** → 該**檢定**附加 2 顆**你的技巧或智慧骰** 和 **優勢 + 2**"},{"cost":"3","title":"叛者的哀鳴","type":"行動","subtype":"混合","tags":["保留","失去生命","臨時生命","怨靈"],"body":"你對**範圍3內**的**一名敵方**單位進行檢定(技+智):\n* 失敗:**失去** 1 點**生命** \n* 成功:**失去** 2 點**生命**  \n* 大成功:**失去** 4 點**生命**\n\n【技能結束後】於目標**範圍1內**的**無單位**地塊**創造** 1 隻【怨靈】。該**召喚物**獲得「等同於目標**失去生命**」的**臨時生命**，隨後進入保留。\n\n**保留3**｜持續期間:\n你維持**召喚物**【怨靈】。\n【該召喚物死亡時】**解除保留**此卡。"},{"cost":"2","title":"孽祭肉骸","type":"行動","subtype":"遠程","tags":["保留","肉骸"],"body":"你於**範圍2內**的**無單位**地塊創造 1 隻【肉骸】，隨後進入保留。\n\n**保留3**｜持續期間:\n你維持召喚物【肉骸】\n【該召喚物死亡時】**解除保留**此卡"},{"cost":"2","title":"交叉感染","type":"行動","subtype":"混合","tags":["中毒","劣勢"],"body":"此技能可在【技能結束後】宣告以目標做為技能發起點，再次施放；若你這麼做，此技能檢定劣勢+1，**劣勢**會**不斷累積**，直至此技能進到**公開區**為止。\n\n你對**範圍2內**的**一名**其他單位進行檢定(技+智)：\n* 失敗:【中毒1】且此技能進到**公開區**\n* 成功:【中毒1】\n* 大成功:【中毒2】"},{"cost":"1","title":"併發症","type":"行動","subtype":"混合","tags":["中毒","混亂","修正","失去生命"],"body":"你對**範圍3內**的**一名**其他單位進行檢定(技+智)，檢定修正+X；X = 目標中毒的層數:\n* 失敗:無效果\n* 成功:【混亂】 \n* 大成功:【混亂】且**失去** 2 點**生命**"},{"cost":"2","title":"七竅淌毒","type":"行動","subtype":"遠程","tags":["中毒","流血"],"body":"你對**範圍3內**一名【中毒】的單位施放。\n\n目標身上「一半的【中毒】層數」轉化為【流血】，隨後**解除**目標**所有**【中毒】層數。"},{"cost":"2","title":"菌毒繁衍","type":"行動","subtype":"遠程","tags":["中毒"],"body":"對**範圍3內**的一名陷入【中毒】的單位施放：\n目標現有的【中毒】層數**翻倍**。"},{"cost":"2","title":"連環毒孢","type":"行動","subtype":"遠程","tags":["中毒","移動"],"body":"你對**範圍3內**的**一名**單位進行檢定(智+智):\n* 失敗:無效果  \n* 成功:【中毒1】  \n* 大成功:【中毒2】\n【技能結束後】可宣告**消耗** 1 點 **基礎移動**，對**同一目標**再次施放此技能；可重複消耗。"},{"cost":"1","title":"毒孢詭雷","type":"行動","subtype":"自身","tags":["中毒","保留","地標","失去生命","移動"],"body":"在**自身格**的位置**創造** 1 枚**地標**，隨後進入保留。\n\n**保留1**｜持續期間:\n【我方回合結束時】你可使該地標【移動2】，可穿越高地線。\n【解除保留時】地標**範圍1內**的所有單位**失去** 2 點**生命**和【中毒1】，地標格上的**效果雙倍**，隨後移除地標。"},{"cost":"1","title":"不治之症","type":"行動","subtype":"自身","tags":["中毒","保留"],"body":"此卡**進入保留**。\n\n**保留2**｜持續期間:\n* ① 你**範圍2內**的所有敵方單位解除【中毒】**固定為 1 層**(原為 1d意志的一半) \n* ②【我方回合結束時】你**範圍2內**的所有敵方單位**失去**「等同於中毒層數一半」的**生命**；最高 3 點。"},{"cost":"0","title":"混亂打擊","type":"行動","subtype":"近戰","tags":["混亂","失去生命","移動"],"body":"此技能需要你處於【混亂】才可施放。\n鎖定**範圍2內**最近的一名單位，朝其【移動1】，對目標進行檢定(技+技)，若**範圍1內沒有可檢定單位**則改為**對自己**進行檢定:\n* 失敗:**失去** 1 點**生命**  \n* 成功:**失去** 2 點**生命**  \n* 大成功:**失去** 4 點**生命**"},{"cost":"1","title":"混淆心神","type":"行動","subtype":"混合","tags":["混亂","修正"],"body":"你對**範圍3內**的**一名**其他單位進行檢定(技+智)；此技能檢定修正 + (3-X)；X = 你與目標的距離:\n* 失敗:無效果\n* 成功:【混亂】 \n* 大成功:【混亂】並立刻觸發**混亂打擊**"},{"cost":"1","title":"挑撥囁語","type":"行動","subtype":"遠程","tags":["混亂","優勢"],"body":"你使**範圍3**內陷入【混亂】的一名其他單位發動**混亂打擊**並由你鎖定(可鎖定地塊)，且該**混亂打擊**的檢定**優勢+1**。"},{"cost":"1","title":"清醒點!","type":"行動","subtype":"近戰","tags":["暈眩","混亂","優勢","失去生命"],"body":"你對範圍1內的一名單位進行檢定(技+技)；若目標處於【混亂】，解除其【混亂】，此技能檢定附加 1 顆**你的技巧骰**且**優勢 +1**：\n* 失敗:無效果\n* 成功:  【暈眩】\n* 大成功:【暈眩】且**失去** 2 點**生命**"},{"cost":"2","title":"精神控制","type":"行動","subtype":"遠程","tags":["混亂","保留","移動"],"body":"你對**範圍3內**陷入【混亂】的**一名其他單位**施放，隨後進入保留。\n\n**保留2**｜持續期間:\n①目標的**混亂打擊**改由你**鎖定**（可鎖定地塊），且**移動與範圍 +2**。\n②其檢定擲骰改用你的(智+智)。\n③目標解除【混亂】需**額外消耗** 1 點 **COST**。\n【目標死亡或解除混亂時】**解除保留**。"},{"cost":"2","title":"菌入膏肓","type":"行動","subtype":"遠程","tags":["混亂","保留","失去生命","臨時生命"],"body":"你對**範圍3內**陷入【混亂】的**一名其他單位**施放，隨後進入保留。\n\n**保留2**｜持續期間:\n* ①目標因【混亂】施放的混亂打擊，額外施放一次。\n* ②目標**每次**施放**混亂打擊**後,**失去** 1 點**生命**,**無視臨時生命**  \n* ③目標的【混亂】需**額外消耗** 1 點 COST 解除\n【目標死亡或解除混亂時】**解除保留**。"},{"cost":"2","title":"菌絲秘境","type":"行動","subtype":"自身","tags":["混亂","疲憊","保留","移動"],"body":"此卡**進入保留**。\n\n**保留2**｜持續期間:\n①**範圍2內**的所有單位陷入【混亂】與【疲憊】；其【混亂】**不會自動施放混亂打擊**（仍可被其他效果觸發或操控）。\n②**範圍2內**的所有單位**基礎移動消耗 +1**。\n（離開範圍即解除）\n\n*讓我們一同享受，這如幻似夢的美好*"},{"cost":"1","title":"以太射線","type":"行動","subtype":"遠程","tags":["震撼","失去生命"],"body":"你對**範圍3內**的**一名**單位進行檢定(智+智):\n* 失敗:無效果 \n* 成功:【震撼】  \n* 大成功:【震撼】 且**失去** 2 點**生命**"},{"cost":"2","title":"以太聚能炮","type":"行動","subtype":"遠程","tags":["伏倒","踉蹌","震撼","優勢"],"body":"你對**範圍4內**的**一名**單位進行檢定(智+智):\n你可在**擲骰前**宣告額外**消耗** 1 點 **COST** 使此技能**優勢 + 1**；可重複消耗。\n* 失敗:【震撼】  \n* 成功:【震撼】 且【踉蹌】\n* 大成功:【震撼】且【伏倒】"},{"cost":"1","title":"震撼腦髓","type":"行動","subtype":"遠程","tags":["震撼","優勢","失去生命"],"body":"你對**範圍3內**的一名單位進行檢定(智+智)；若目標處於【震撼】，解除其【震撼】，此技能檢定附加 1 顆**你的智慧骰**且**優勢 +1**：\n* 失敗:無效果 \n* 成功:**失去** 2 點**生命** \n* 大成功:**失去** 5 點**生命**"},{"cost":"1","title":"以太餘震","type":"反應","subtype":"自身","tags":["震撼","保留","遺忘"],"body":"當你對一名單位造成【震撼】後，選擇該目標**公開區**的 1 張卡牌，將其【遺忘】，可宣告進入保留。\n\n**保留2**｜持續期間:\n被你【遺忘】的那張技能卡**無法回憶**。"},{"cost":"1","title":"腦震盪","type":"反應","subtype":"自身","tags":["暈眩","踉蹌","保留","劣勢"],"body":"當你造成【暈眩】的單位**宣告解除**【暈眩】時，其陷入【踉蹌】，隨後進入保留。\n\n**保留1**｜持續期間:\n目標所有**擲骰劣勢 +1**。\n【我方回合開始時】**解除保留**。"},{"cost":"0","title":"注意力不集中","type":"祕密","subtype":"自身","tags":["恢復COST","遺忘"],"body":"當你**公開區**的卡牌【遺忘】時，可**揭露**此卡：\n你**恢復** 1 點 **COST**,此卡代替該卡被【遺忘】。"},{"cost":"1","title":"落葉借勢","type":"反應","subtype":"自身","tags":["優勢"],"body":"當你【進行檢定時】 → 可使其**優勢 +1**。\n\n若此技能卡在**公開區**，可不消耗 COST 發動，隨後必須**收回此卡**。"},{"cost":"1","title":"刺探步","type":"行動","subtype":"近戰","tags":["優勢","移動"],"body":"你朝**範圍2內**的一名單位【移動1】，隨後進行檢定(技+技) :\n* 失敗:你【移動1】  \n* 成功:本回合**下一次**對**同一目標**的檢定**優勢 + 2**  \n* 大成功:同上且附加 1 顆**你的技巧骰**\n【技能結束後】可**收回此卡**,而非留在**公開區**"},{"cost":"1","title":"詭距刺擊","type":"行動","subtype":"近戰","tags":["失去生命"],"body":"你對**範圍1內**的**一名**單位進行檢定(技+技);你可宣告**額外消耗** 1 點 **COST**,使此技能的**範圍 +1** 且**火線改為混合**:\n* 失敗:**失去** 1 點**生命**\n* 成功:**失去** 3 點**生命**\n* 大成功:**失去** 5 點**生命**"},{"cost":"1","title":"聚影雷標","type":"行動","subtype":"遠程","tags":["失去生命","移動"],"body":"你對**範圍 2 內**的**一名**單位進行檢定(智+智);可宣告**消耗** 1 點**基礎移動**使此技能**範圍 +1**;可重複消耗:\n* 失敗:**失去** 1 點**生命**\n* 成功:**失去** 2 點**生命**\n* 大成功:**失去** 4 點**生命**"},{"cost":"1","title":"亂戰漫遊","type":"行動","subtype":"自身","tags":["移動"],"body":"你【移動1】;移動後若你**範圍 2 內**有**兩名以上** <script>
/* 統一列印頁 —— 卡牌＋特性同頁、模式鈕切換、列印方向自動跟著換（一次只印當前模式）。
   解析／渲染共用 ../_共用（card-parse / card-filter / trait-render，與熱修窗單一來源）。
   無 dev 件（lint／密度／熱修）——那些只活在工作台。 */
var CARDS=(window.CARDS||[]), VOCAB=(window.VOCAB||{}), TRAITS=(window.TRAITS||[]);
var stage=document.getElementById('stage');
var mode='card';

/* ---- 卡牌 ---- */
function renderCard(c){var o={};for(var k in c)o[k]=c[k];o.artH=0;return card(o);}
function renderSheets(list){
  var per=8,n=Math.ceil(list.length/per),html='';
  for(var s=0;s<n;s++){
    var a=list.slice(s*per,s*per+per);
    html+='<div class="cap">第 '+(s+1)+' / '+n+' 張 A4　·　'+(s*per+1)+'–'+(s*per+a.length)+'（顯示 '+list.length+' 張）</div>';
    html+='<div class="sheet">'+a.map(renderCard).join('')+'</div>';
  }
  if(!list.length)html='<div class="cap">沒有符合篩選的卡</div>';
  stage.innerHTML=html;
}
function fitCards(){Array.prototype.forEach.call(document.querySelectorAll('.cb-body'),function(el){var fs=12;el.style.fontSize=fs+'px';var g=120;while(el.scrollHeight>el.clientHeight+0.5&&fs>7&&g-->0){fs-=0.2;el.style.fontSize=fs+'px';}});}
var model=buildFilterModel(CARDS,VOCAB);
var sel={type:{},fire:{},status:{},mech:{}};
function fillChips(elId,group){document.getElementById(elId).innerHTML=group.chips.map(function(ch){return '<button class="chip" data-dim="'+group.dim+'" data-val="'+esc(ch.val)+'">'+esc(ch.val)+'<span class="c">'+ch.count+'</span></button>';}).join('');}
fillChips('g-type',model.groups[0]);fillChips('g-fire',model.groups[1]);fillChips('g-status',model.groups[2]);fillChips('g-mech',model.groups[3]);
function applyFilter(){
  var list=CARDS.filter(function(c){return cardPasses(c,sel,model.sets);});
  renderSheets(list);
  document.getElementById('tcount').textContent='顯示 '+list.length+' / '+CARDS.length+' 張';
  fitCards();
}
document.getElementById('filters').addEventListener('click',function(e){
  var b=e.target.closest('.chip');if(!b)return;
  var dim=b.getAttribute('data-dim'),val=b.getAttribute('data-val');
  if(sel[dim][val])delete sel[dim][val];else sel[dim][val]=1;
  b.classList.toggle('on');applyFilter();
});
document.getElementById('fclear').addEventListener('click',function(){
  sel={type:{},fire:{},status:{},mech:{}};
  Array.prototype.forEach.call(document.querySelectorAll('#filters .chip.on'),function(c){c.classList.remove('on');});
  applyFilter();
});

/* ---- 特性 ---- */
function renderTraits(){
  window.TRAIT.renderInto(stage, TRAITS);
  document.getElementById('tcount').textContent='共 '+TRAITS.length+' 個特性';
  window.TRAIT.fit();
}

/* ---- 模式切換（含列印方向）---- */
function setMode(m){
  mode=m;
  document.getElementById('m-card').classList.toggle('on',m==='card');
  document.getElementById('m-trait').classList.toggle('on',m==='trait');
  document.getElementById('filters').classList.toggle('hide',m!=='card');
  document.documentElement.setAttribute('data-mode',m);
  document.getElementById('pagestyle').textContent = (m==='card')
    ? '@page{size:A4 landscape;margin:0;}'
    : '@page{size:A4 portrait;margin:0;}';
  try{sessionStorage.setItem('wb-mode',m);}catch(e){}
  if(m==='card')applyFilter();else renderTraits();
}
document.getElementById('m-card').addEventListener('click',function(){setMode('card');});
document.getElementById('m-trait').addEventListener('click',function(){setMode('trait');});

function refit(){ if(mode==='card')fitCards(); else window.TRAIT.fit(); }
window.addEventListener('resize',refit);
window.addEventListener('beforeprint',refit);
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(refit);}
setTimeout(refit,400);setTimeout(refit,1200);

/* 預設模式：網址含 trait/特性 → 開特性（相容舊 /traits/ 連結）；否則沿用上次或卡牌 */
var urlMode=/trait|特性/.test(location.pathname)?'trait':null;
var initMode=urlMode;
if(!initMode){try{initMode=sessionStorage.getItem('wb-mode')||'card';}catch(e){initMode='card';}}
setMode(initMode);
</script>
