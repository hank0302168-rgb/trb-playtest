<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>骰吧 · 卡牌閱讀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#26262b;color:#e9e9ec;font-family:'Noto Sans TC',sans-serif;}

/* ===== 篩選列（sticky、可收合；閱讀版無水平捲動，sticky 即可） ===== */
#filters{position:sticky;top:0;z-index:50;background:#141417;color:#fff;padding:9px 14px;box-shadow:0 2px 12px rgba(0,0,0,.45);}
#filters .frow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:5px 0;}
#filters .lbl{flex:0 0 58px;font-size:12px;opacity:.6;}
.ftitle{font-family:'Noto Serif TC',serif;font-weight:700;letter-spacing:1px;}
#count{font-size:13px;opacity:.85;margin-left:8px;}
#fclear{font-size:12px;color:#9cf;cursor:pointer;text-decoration:underline;margin-left:auto;}
#ftoggle{font-size:12px;color:#9cf;cursor:pointer;user-select:none;padding:3px 9px;border:1px solid #555;border-radius:13px;white-space:nowrap;margin-left:10px;}
#ftoggle:hover{border-color:#999;}
#filters.collapsed #fgroups{display:none;}
.chip{font-family:inherit;font-size:12px;line-height:1;padding:5px 9px;border-radius:13px;border:1px solid #5a5a5a;background:transparent;color:#ddd;cursor:pointer;white-space:nowrap;}
.chip:hover{border-color:#9a9a9a;}
.chip.on{background:#ececec;color:#111;border-color:#ececec;font-weight:500;}
.chip .c{opacity:.5;margin-left:4px;font-size:11px;}

/* ===== 卡片網格：手機 1 欄、≥560px 2 欄 ===== */
#stage{max-width:760px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr;gap:16px;}
@media(min-width:560px){#stage{grid-template-columns:repeat(2,1fr);}}
#empty{grid-column:1/-1;text-align:center;opacity:.6;padding:40px 0;}

/* ===== 卡面（閱讀版：每張固定卡片比例＝大小統一；密集卡由 fitReading 縮字塞入） ===== */
.cb{background:#fff;color:#111;border-radius:13px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.3);aspect-ratio:5/7;}
.cb-frame{height:100%;display:flex;flex-direction:column;}
.cb-title{flex:0 0 auto;display:flex;align-items:center;gap:9px;background:#111;color:#fff;padding:11px 13px;font-family:'Noto Serif TC',serif;}
.cb-cost{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;}
.cb-cost span{font-size:18px;font-weight:700;line-height:1;}
.cb-name{flex:1;font-size:19px;font-weight:700;letter-spacing:1.5px;line-height:1.25;}
.cb-type{flex:0 0 auto;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:.5px;color:#cfcfcf;text-align:right;white-space:nowrap;}
.cb-body{flex:1;min-height:0;overflow:hidden;padding:14px 15px;font-size:15px;line-height:1.7;color:#1a1a1a;display:flex;flex-direction:column;gap:10px;}
.cb-outs{display:flex;flex-direction:column;gap:7px;}
.cb-out{display:flex;align-items:stretch;gap:9px;}
.cb-mark{flex:0 0 auto;width:4px;border-radius:2px;}
.cb-mark.crit{background:#111;}
.cb-mark.norm{background:#cfcfcf;}
.cb-olabel{flex:0 0 auto;min-width:3.6em;font-family:'Noto Serif TC',serif;font-weight:700;align-self:flex-start;padding-top:1px;}
.cb-otext{flex:1;}
.cb-res{border:1.5px solid #111;border-radius:7px;overflow:hidden;}
.cb-reshead{background:#111;color:#fff;display:flex;align-items:baseline;gap:9px;padding:6px 11px;}
.cb-restag{font-family:'Noto Serif TC',serif;font-weight:700;}
.cb-ressub{font-size:.8em;letter-spacing:.5px;opacity:.85;}
.cb-resbody{padding:9px 11px;display:flex;flex-direction:column;gap:7px;}
.cb-item{display:flex;gap:8px;align-items:baseline;}
.cb-marker{flex:0 0 auto;font-weight:700;}
.cb-itext{flex:1;}
.cb-body b{font-weight:700;}
</style>
</head>
<body>
<div id="filters">
  <div class="frow fhead"><span class="ftitle">骰吧卡牌閱讀</span><span id="count"></span><span id="fclear">清除</span><span id="ftoggle"></span></div>
  <div id="fgroups"></div>
</div>
<div id="stage"></div>

<script>
// 卡片內文解析 + 卡面 DOM 產生（瀏覽器端共用權威版）。
// 卡牌列印 與 卡牌閱讀 共用同一份，避免兩份 drift。各自 build.js 會把本檔內嵌進 dist。
// 不依賴版面——只負責「卡資料 → 語意區塊 → .cb 卡面 DOM」；放大／A4／流式排版由各工具的 CSS 決定。
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
function parseInline(str){if(str==null)return[];str=String(str).replace(/\\([+\-|()\[\]])/g,'$1');var out=[];str.split('**').forEach(function(part,i){var bb=i%2===1;part.split(/(【[^】]*】)/).forEach(function(s){if(!s)return;var kw=/^【[^】]*】$/.test(s);var b=bb||kw;out.push({t:s,b:b});});});return out;}
function segs(s){return parseInline(s).map(function(g){return g.b?'<b>'+esc(g.t)+'</b>':'<span>'+esc(g.t)+'</span>';}).join('');}

function parseBody(body){
  var lines=String(body||'').split('\n').map(function(s){return s.replace(/\s+$/,'').trim();}).filter(Boolean);
  var blocks=[],inRes=false,resObj=null,curOut=null;
  lines.forEach(function(line){
    var l=line.replace(/^\*\s+/,'');
    if(inRes){resObj.items.push(l);return;}
    if(/持續期間/.test(line)){var h=line.replace(/\*\*/g,'').replace(/[:：]\s*$/,'');var p=h.split('｜');resObj={tag:(p[0]||'保留').trim(),sub:(p[1]||'').replace(/[:：]\s*$/,'').trim(),items:[]};blocks.push({reserve:resObj});inRes=true;curOut=null;return;}
    var mm=/^(大成功|大失敗|失敗|成功)\s*[:：]\s*([\s\S]*)$/.exec(l);
    if(mm){if(!curOut){curOut={outcomes:[]};blocks.push(curOut);}curOut.outcomes.push({label:mm[1],text:mm[2],crit:(mm[1]==='大成功')});return;}
    curOut=null;blocks.push({p:l});
  });
  return blocks;
}

function para(p){return'<div>'+segs(p)+'</div>';}
function outs(items){return'<div class="cb-outs">'+items.map(function(o){return'<div class="cb-out"><div class="cb-mark '+(o.crit?'crit':'norm')+'"></div><div class="cb-olabel">'+esc(o.label)+'</div><div class="cb-otext">'+segs(o.text)+'</div></div>';}).join('')+'</div>';}
function res(r){var its=r.items.map(function(t){var mk=/^([①②③④⑤⑥⑦⑧⑨])/.exec(t);return mk?'<div class="cb-item"><span class="cb-marker">'+esc(mk[1])+'</span><div class="cb-itext">'+segs(t.slice(1))+'</div></div>':'<div class="cb-item"><div class="cb-itext">'+segs(t)+'</div></div>';}).join('');return'<div class="cb-res"><div class="cb-reshead"><span class="cb-restag">'+esc(r.tag)+'</span><span class="cb-ressub">'+esc(r.sub)+'</span></div><div class="cb-resbody">'+its+'</div></div>';}
function block(b){if(b.p!==undefined)return para(b.p);if(b.outcomes)return outs(b.outcomes);if(b.reserve)return res(b.reserve);return'';}
function card(c){
  var tr=[c.type,c.subtype].filter(Boolean).join(' · ');
  var artH=(c.artH===undefined?46:c.artH);
  var art=artH>0?'<div class="cb-art" style="height:'+artH+'mm"><span>插圖 · ART</span></div>':'';
  var body=parseBody(c.body).map(block).join('');
  return'<div class="cb"><div class="cb-frame"><div class="cb-title"><div class="cb-cost"><span>'+esc(c.cost)+'</span></div><div class="cb-name">'+esc(c.title)+'</div><div class="cb-type">'+esc(tr)+'</div></div>'+art+'<div class="cb-body">'+body+'</div></div></div>';
}

</script>
<script>
// 卡牌篩選邏輯（瀏覽器端共用權威版）——卡牌列印 與 卡牌閱讀 共用，避免 drift。
// 只負責「資料 → 篩選模型／判定」；篩選 UI（chip 外觀、收合行為）由各工具自行套樣式。
// buildFilterModel(CARDS,VOCAB) → { sets, groups }；cardPasses(card, sel, sets) → bool。
function buildFilterModel(CARDS, VOCAB){
  VOCAB = VOCAB || {};
  var statusSet={}, mechSet={}, summonSet={};
  (VOCAB.status||[]).forEach(function(t){statusSet[t]=1;});
  (VOCAB.mech||[]).forEach(function(t){mechSet[t]=1;});
  (VOCAB.summon||[]).forEach(function(t){summonSet[t]=1;});
  var sets={status:statusSet, mech:mechSet, summon:summonSet};

  function countBy(key){var m={};CARDS.forEach(function(c){var v=c[key]||'';if(v)m[v]=(m[v]||0)+1;});return m;}
  function ordered(map,pref){return Object.keys(map).sort(function(a,b){var ia=pref.indexOf(a),ib=pref.indexOf(b);ia=ia<0?99:ia;ib=ib<0?99:ib;return ia-ib||map[b]-map[a]||a.localeCompare(b,'zh-Hant');});}
  var tagCount={};CARDS.forEach(function(c){(c.tags||[]).forEach(function(t){tagCount[t]=(tagCount[t]||0)+1;});});
  function tagCat(t){return statusSet[t]?'status':(summonSet[t]?'summon':'mech');}
  function tagsOf(cat){return Object.keys(tagCount).filter(function(t){return tagCat(t)===cat;}).sort(function(a,b){return tagCount[b]-tagCount[a]||a.localeCompare(b,'zh-Hant');});}
  function mk(values,countMap){return values.map(function(v){return {val:v,count:countMap[v]};});}

  var typeCount=countBy('type'), fireCount=countBy('subtype');
  var summonCount=CARDS.filter(function(c){return (c.tags||[]).some(function(t){return summonSet[t];});}).length;
  var mechVals=tagsOf('mech'); var mechCountMap={}; mechVals.forEach(function(v){mechCountMap[v]=tagCount[v];});
  if(summonCount){ mechVals=mechVals.concat(['召喚物']); mechCountMap['召喚物']=summonCount; }

  var groups=[
    {dim:'type',   label:'卡牌',     chips:mk(ordered(typeCount,['行動','反應','祕密','召喚物']), typeCount)},
    {dim:'fire',   label:'火線',     chips:mk(ordered(fireCount,['近戰','遠程','混合','自身']), fireCount)},
    {dim:'status', label:'狀態效果', chips:mk(tagsOf('status'), tagCount)},
    {dim:'mech',   label:'機制',     chips:mk(mechVals, mechCountMap)}
  ];
  return {sets:sets, groups:groups};
}

function cardPasses(c, sel, sets){
  function selOn(o){for(var k in o)if(o[k])return true;return false;}
  if(selOn(sel.type) && !sel.type[c.type]) return false;
  if(selOn(sel.fire) && !sel.fire[c.subtype]) return false;
  var tg=c.tags||[];
  if(selOn(sel.status) && !tg.some(function(t){return sel.status[t];})) return false;
  if(selOn(sel.mech)){
    var hit=false;
    for(var v in sel.mech){ if(!sel.mech[v]) continue;
      if(v==='召喚物'){ if(tg.some(function(t){return sets.summon[t];})){hit=true;break;} }
      else if(tg.indexOf(v)>=0){ hit=true; break; }
    }
    if(!hit) return false;
  }
  return true;
}

</script>

":"行動","subtype":"近戰","tags":["束足","牽引"],"body":"你對**範圍1內**的**一名**單位進行檢定(技+技):\n* 失敗:【牽引1】至你的**相鄰格**  \n* 成功:**交換位置**  \n* 大成功:**交換位置**並【束足】"},{"cost":"2","title":"返身錯打","type":"行動","subtype":"近戰","tags":["束足","失去生命","移動","轉向"],"body":"你【移動1】，隨後對至**範圍1內**的**一名**單位進行檢定(技+技)：\n* 失敗:無效果\n* 成功:【轉向1】\n* 大成功:【轉向2】\n【技能結束後】若你位於目標**背面格** → 目標**失去** 2 點**生命**，若為**正背面**則附加【束足】"},{"cost":"2","title":"斧刃腿","type":"行動","subtype":"近戰","tags":["流血","失去生命","移動"],"body":"此技能需要你**消耗基礎移動靠近**施放目標後才可施放。\n你對**範圍1內**的**一名**單位進行檢定(技+技)：\n* 失敗:**失去** 1 點**生命**\n* 成功:**失去** 2 點**生命** 並【流血1】\n* 大成功:**失去** 3 點**生命** 並【流血2】"},{"cost":"2","title":"鎖喉","type":"行動","subtype":"近戰","tags":["暈眩","踉蹌"],"body":"你對**範圍1內**的一名單位進行檢定(技+技)；若你在目標**正背面相鄰格** → 檢定附加 1 顆**你的技巧骰**:\n* 失敗:【踉蹌】\n* 成功:【踉蹌】且【暈眩】\n* 大成功:【踉蹌】且【暈眩】，目標需**額外消耗** 1 點 **COST** 解除"},{"cost":"1","title":"擒拿","type":"行動","subtype":"近戰","tags":["伏倒","暈眩","保留","移動"],"body":"你對**範圍1內**一名處於【暈眩】或【伏倒】的單位施放，隨後**進入保留**。\n\n**保留2**｜持續期間:\n你**移動**時，目標**跟隨於你、由你操控**（你每移動 1 格，目標隨即移動至你**移動前所在的格**）。\n**我方回合結束時** → **解除保留**此卡。"},{"cost":"0","title":"追風拳","type":"反應","subtype":"近戰","tags":["失去生命"],"body":"當你施放**近戰技能**後，對**同一目標**進行檢定(技+技):\n* 失敗:無效果\n* 成功:**失去** 1 點**生命**  \n* 大成功:**失去** 3 點**生命**"},{"cost":"0","title":"斷筋連綿","type":"反應","subtype":"近戰","tags":["踉蹌","失去生命"],"body":"當你施放**近戰技能**後，對**同一目標**進行檢定(技+技):\n* 失敗:  無效果\n* 成功:【踉蹌】 \n* 大成功:【踉蹌】且**失去** 2 點**生命**"},{"cost":"1","title":"蜥嘯連擊","type":"反應","subtype":"自身","tags":[],"body":"當你施放**近戰技能**後，本回合**下一次**對**同一目標**的**近戰**消耗 COST - 1。\n\n若此技能卡在**公開區**,可不消耗 COST 發動,隨後必須**收回此卡**"},{"cost":"1","title":"稱勝追擊","type":"行動","subtype":"自身","tags":[],"body":"當你的檢定**大成功**時，待其【技能結束後】**複製**其「**成功**」級的效果對**同一目標**施放。"},{"cost":"1","title":"落井下石","type":"反應","subtype":"混合","tags":["失去生命"],"body":"當你**範圍2內**的**一名其他**單位受到**檢定**，待其【技能結束後】對**同一目標**(技+智):\n* 失敗:**失去** 1 點**生命**  \n* 成功:**失去** 3 點**生命**\n* 大成功:**失去** 5 點**生命**"},{"cost":"1","title":"動能反彈","type":"反應","subtype":"自身","tags":["踉蹌","推移","檢定結果"],"body":"當你受到**檢定**，待其【技能結束後】，你對**檢定來源**【推移 (3-X)】；X = 你與**檢定來源**的**距離**。\n若你受到**成功**或**大成功**的**檢定結果** → **檢定來源**陷入【踉蹌】"},{"cost":"1","title":"鐵山靠","type":"反應","subtype":"自身","tags":["踉蹌","保留","檢定結果","移動"],"body":"當你【受到**檢定**時】，你可**重擲其至多 1 顆骰子**，並決定是否保留新結果。\n在其【技能結束後】，你朝檢定**來源**【移動1】；若因此**移動**至**目標相鄰格** → 目標陷入【踉蹌】\n(檢定結果最低為失敗、最高為大成功。)"},{"cost":"1","title":"緊急自療","type":"反應","subtype":"自身","tags":["失去生命","恢復生命"],"body":"當你【**失去生命**後】**恢復** 1 點**生命**;若你當前生命**低於基礎生命的一半** → 額外**恢復** 1 點**生命**。"},{"cost":"1","title":"吐故納新","type":"反應","subtype":"自身","tags":["失去生命","臨時生命"],"body":"當你【失去生命後】你獲得「等同於**一半失去生命**」的**臨時生命**；此臨時生命可疊加。(向下取整)"},{"cost":"1","title":"四兩撥千斤","type":"反應","subtype":"自身","tags":["拒絕","檢定結果"],"body":"若你受到的**檢定**結果為「失敗」→ **拒絕**該技能卡所有效果。"},{"cost":"1","title":"截勁反打","type":"反應","subtype":"自身","tags":["失去生命"],"body":"當你【受到檢定】導致失去生命時 → **減少** 2 點即將**失去**的**生命**，隨後**檢定來源失去** 1 點**生命**。"},{"cost":"0","title":"緊急能量護盾","type":"反應","subtype":"自身","tags":["保留","失去生命","臨時生命"],"body":"當你【受到檢定】導致失去生命時 → **解除**你身上的**臨時生命**，**減少**此次**即將失去**的**生命**至多 4 點，隨後**進入保留**。\n\n**保留2**｜持續期間:\n**【無法主動解除保留】**\n【我方回合結束時】**解除保留**此卡。"},{"cost":"1","title":"鋼筋鐵骨","type":"行動","subtype":"自身","tags":["破甲","保留","臨時生命"],"body":"此卡進入保留；若你處於【破甲】→ 解除破甲。\n\n**保留1**｜持續期間:\n* ① 你的**對抗門檻 +1**  \n* ②【我方回合結束時】你獲得**臨時生命1**\n當你受到【破甲】時 → **解除保留**此卡。"},{"cost":"1","title":"滑音","type":"反應","subtype":"混合","tags":["牽引"],"body":"當有**一名其他**單位**進入**你的**範圍1內**，你對其【牽引1】，此牽引可穿越高地線。\n若目標因你的牽引還在你的**範圍1內**，你再次對**同一目標**【牽引1】。"},{"cost":"1","title":"想跑去哪？","type":"反應","subtype":"近戰","tags":["嘲諷","移動","轉向"],"body":"當你**範圍1內**的**一名**單位施放帶有【移動】詞綴的技能，待其【技能結束後】，目標受到你【嘲諷】且【轉向2】。"},{"cost":"1","title":"順水推舟","type":"反應","subtype":"近戰","tags":["失去生命","拉拽","推移","牽引","轉向"],"body":"當**一名其他**單位因【拉拽】、【推移】、【牽引】**進入**你**範圍1內**，或你**範圍1內**的**一名其他**單位受到【轉向】，待其【技能結束後】，你對目標【牽引1】。\n\n若目標被**牽引**至與**地形線、單位相鄰** → **失去** 2 點**生命**。(相鄰單位也會失去生命，若兩名以上，則自行選一名失去生命)"},{"cost":"1","title":"疲於奔命","type":"反應","subtype":"遠程","tags":["伏倒","疲憊","踉蹌","保留","移動"],"body":"當**一名**單位在你**範圍3內**消耗完所有**基礎移動**時，目標陷入【踉蹌】，隨後**進入保留**。\n\n**保留1**｜持續期間: \n目標**解除**【踉蹌】或【伏倒】時 → 獲得【疲憊】，隨後**解除保留**此卡。"},{"cost":"1","title":"卡位","type":"行動","subtype":"自身","tags":["保留","移動"],"body":"你【移動1】，隨後進入保留。\n\n**保留1**｜持續期間:   \n你**範圍1內**的其他單位**基礎移動消耗 +1**。\n【我方回合開始時】**解除保留**此卡。"},{"cost":"1","title":"直線衝刺","type":"行動","subtype":"自身","tags":["踉蹌","移動"],"body":"你朝一個方向直線【移動3】，若過程中**撞到單位**、**掩體線**、**高地線**和**阻擋線** → 在阻擋處**停下**。\n\n【技能結束後】→ 你獲得【踉蹌】。"},{"cost":"1","title":"趕月腿","type":"行動","subtype":"自身","tags":["保留","移動"],"body":"你【移動1】，隨後進入保留。\n\n**保留2**｜持續期間:\n你的**基礎移動 +2** \n【你施放技能或受到技能影響後】**解除保留**。"},{"cost":"1","title":"位面穿梭","type":"行動","subtype":"自身","tags":["保留","瞬移"],"body":"你【瞬移2】，此瞬移**火線**無視**高地線**，隨後進入保留。\n\n**保留2**｜持續期間:\n**【無法主動解除保留】**\n【我方回合開始時】**解除保留**此卡。"},{"cost":"1","title":"木靈影步","type":"行動","subtype":"自身","tags":["保留","移動"],"body":"你【移動1】,若你移動進入**困難地塊**或跨越**掩體線** → 額外【移動1】，隨後進入保留。\n\n **保留1**｜持續期間：\n 你的**對抗門檻 +2**。 \n【我方回合開始時】**解除保留**。"},{"cost":"1","title":"順流之風","type":"行動","subtype":"遠程","tags":["保留","牽引","移動"],"body":"你對**範圍2內**的**一名其他我方**單位【牽引2】，隨後進入保留。\n\n**保留1**｜持續期間:\n目標的**基礎移動消耗 -1**(最低為 1)。"},{"cost":"1","title":"奪命勾鎖","type":"行動","subtype":"混合","tags":["踉蹌","拉拽"],"body":"此技能造成的【拉拽】可穿越高地線。\n你對**範圍3內**的**一名**單位進行檢定(技+智):\n* 失敗:【拉拽1】\n* 成功:【拉拽2】\n* 大成功:【拉拽2】並【踉蹌】"},{"cost":"1","title":"藤索拉扯","type":"行動","subtype":"混合","tags":["踉蹌","牽引"],"body":"你對**範圍3內**的**一名**單位進行檢定(技+智):\n* 失敗:無效果  \n* 成功:【牽引1】  \n* 大成功:【牽引2】\n【技能結束後】目標和其**範圍1內**的**一名其他**單位陷入【踉蹌】。"},{"cost":"1","title":"靈體撕裂","type":"行動","subtype":"混合","tags":["恐懼","失去生命","臨時生命"],"body":"此技能**無視**目標的**臨時生命**。\n你對**範圍2內**的**一名**單位以其**對抗門檻 -3** 進行檢定(技+智):\n* 失敗:無效果 \n* 成功:**失去** 2 點**生命**\n* 大成功:**失去** 2 點**生命**且【恐懼】"},{"cost":"2","title":"躍擊","type":"行動","subtype":"混合","tags":["失去生命","牽引","瞬移"],"body":"你**瞬移**至**範圍2內**的**任意地塊**，若你選擇的地塊上**有單位** → 先【牽引1】後再瞬移，隨後對該單位進行檢定(技+智):\n* 失敗:**失去** 1 點**生命**\n* 成功:失去 3 點生命\n* 大成功:失去 5 點生命"},{"cost":"1","title":"穩定心神","type":"行動","subtype":"混合","tags":["修正","移動"],"body":"你對**範圍2內**的**一名其他單位**進行檢定(技+智)，**擲骰前**可宣告**消耗** 1 點**基礎移動**使**修正 +2**;可重複消耗:\n* 失敗:**解除**目標身上**負面狀態** 1 次\n* 成功:**解除**目標身上**負面狀態** 2 次  \n* 大成功:**解除**目標身上**負面狀態** 3 次"},{"cost":"1","title":"療癒之曲","type":"行動","subtype":"混合","tags":["修正","恢復生命","移動","臨時生命"],"body":"你對**範圍2內**的**一名其他單位**進行檢定(技+智)，**擲骰前**可宣告**消耗** 1 點**基礎移動**使**修正 +2**;可重複消耗:\n* 失敗:**恢復** 1 點**生命**  \n* 成功:**恢復** 2 點**生命**  \n* 大成功:**恢復** 2 點**生命** 且獲得**臨時生命1**(可以疊加)"},{"cost":"1","title":"調音","type":"反應","subtype":"遠程","tags":["保留"],"body":"當你**範圍2內**的**其他單位**【擲骰後】可重擲其骰最多 2 次（每次 1 顆），你決定是否保留。\n\n【技能結束後】可**額外消耗** 1 點 **COST**，**重新選擇** 1 顆骰子**重擲**；可重複消耗。"},{"cost":"2","title":"餘音繞樑","type":"行動","subtype":"遠程","tags":["振奮","保留","地標"],"body":"你在**範圍3內**的任意個地塊**創造** 1 枚**地標**，隨後此卡進入保留。\n\n**保留2**｜持續期間:\n①地標**範圍1內**的**所有我方**單位獲得【振奮】，離開範圍則解除。\n②【我方回合結束時】地標**範圍1內**的單位**總計恢復最多** 2 點**生命**（由你自由分配）。\n【解除保留時】移除地標"},{"cost":"1","title":"陰險地沼","type":"行動","subtype":"遠程","tags":["保留","地標"],"body":"你在**範圍3內**的任意地塊**創造** 1 枚**地標**，隨後此卡進入保留。\n\n**保留1**｜持續期間:\n地標所在的**地塊**視為**困難地形**。\n【解除保留時】移除地標。"},{"cost":"2","title":"靜謐孢幕","type":"行動","subtype":"自身","tags":["保留","失去生命","臨時生命"],"body":"你獲得**臨時生命4**，此卡**進入保留**。\n\n**保留2**｜持續期間: \n①你**範圍1內**的**所有我方**單位**對抗門檻 +1**\n②你**範圍1內**的**所有我方**單位【失去生命時】優先減少你的**臨時生命**。\n當你**臨時生命歸零**時 → **解除保留**此卡。"},{"cost":"1","title":"星穹矩陣","type":"行動","subtype":"遠程","tags":["保留","地標","瞬移"],"body":"你在**範圍3內**的任意地塊**創造** 1 枚**地標**，隨後進入保留。\n\n**保留1**｜持續期間:\n①【我方回合結束時】你可使該地標【瞬移1】。\n②【我方回合結束時】地標**範圍1內**的**所有單位**最多**失去** 1d4 點**生命**（由你自由分配）。\n【解除保留時】移除地標。"},{"cost":"2","title":"英勇戰歌","type":"行動","subtype":"遠程","tags":["振奮","保留","牽引","臨時生命"],"body":"你對**範圍2內**的**其他所有我方**單位【牽引1】，且獲得**臨時生命2**，隨後**進入保留**。\n\n**保留1**｜持續期間:\n你**範圍2內**的單位獲得【振奮】，離開範圍則解除。"},{"cost":"2","title":"戰神裁決","type":"行動","subtype":"近戰","tags":["恐懼"],"body":"當你**範圍1內**的**一名**單位**生命低於四分之一**(向下取整)，你可以使其**立刻死亡**，並對你**範圍3內**的**所有敵方**單位造成【恐懼】。"},{"cost":"1","title":"戰場解析","type":"行動","subtype":"自身","tags":["保留","劣勢"],"body":"此卡**進入保留**。\n\n**保留1**｜持續期間:\n* ①你的**檢定**不會在你**範圍3內**因**掩體線**、**高地線**和**單位**而劣勢\n* ②你的**火線**不會在你**範圍3內**受**高地線**阻擋"},{"cost":"2","title":"渾身蓄力","type":"行動","subtype":"自身","tags":["保留","優勢"],"body":"此卡進入保留。\n\n**保留2**｜持續期間:\n* ①你的**對抗門檻 + 2**  \n* ②你**無法**施放**任何技能**\n【無法主動解除保留】\n\n【我方回合開始時】解除保留此卡，若本回合**首個施放**的技能是**檢定技能** → 該**檢定**附加 2 顆**你的技巧或智慧骰** 和 **優勢 + 2**"},{"cost":"3","title":"叛者的哀鳴","type":"行動","subtype":"混合","tags":["保留","失去生命","臨時生命","怨靈"],"body":"你對**範圍3內**的**一名敵方**單位進行檢定(技+智):\n* 失敗:**失去** 1 點**生命** \n* 成功:**失去** 2 點**生命**  \n* 大成功:**失去** 4 點**生命**\n\n【技能結束後】於目標**範圍1內**的**無單位**地塊**創造** 1 隻【怨靈】。該**召喚物**獲得「等同於目標**失去生命**」的**臨時生命**，隨後進入保留。\n\n**保留3**｜持續期間:\n你維持**召喚物**【怨靈】。\n【該召喚物死亡時】**解除保留**此卡。"},{"cost":"2","title":"孽祭肉骸","type":"行動","subtype":"遠程","tags":["保留","肉骸"],"body":"你於**範圍2內**的**無單位**地塊創造 1 隻【肉骸】，隨後進入保留。\n\n**保留3**｜持續期間:\n你維持召喚物【肉骸】\n【該召喚物死亡時】**解除保留**此卡"},{"cost":"2","title":"交叉感染","type":"行動","subtype":"混合","tags":["中毒","劣勢"],"body":"此技能可在【技能結束後】宣告以目標做為技能發起點，再次施放；若你這麼做，此技能檢定劣勢+1，**劣勢**會**不斷累積**，直至此技能進到**公開區**為止。\n\n你對**範圍2內**的**一名**其他單位進行檢定(技+智)：\n* 失敗:【中毒1】且此技能進到**公開區**\n* 成功:【中毒1】\n* 大成功:【中毒2】"},{"cost":"1","title":"併發症","type":"行動","subtype":"混合","tags":["中毒","混亂","修正","失去生命"],"body":"你對**範圍3內**的**一名**其他單位進行檢定(技+智)，檢定修正+X；X = 目標中毒的層數:\n* 失敗:無效果\n* 成功:【混亂】 \n* 大成功:【混亂】且**失去** 2 點**生命**"},{"cost":"2","title":"七竅淌毒","type":"行動","subtype":"遠程","tags":["中毒","流血"],"body":"你對**範圍3內**一名【中毒】的單位施放。\n\n目標身上「一半的【中毒】層數」轉化為【流血】，隨後**解除**目標**所有**【中毒】層數。"},{"cost":"2","title":"菌毒繁衍","type":"行動","subtype":"遠程","tags":["中毒"],"body":"對**範圍3內**的一名陷入【中毒】的單位施放：\n目標現有的【中毒】層數**翻倍**。"},{"cost":"2","title":"連環毒孢","type":"行動","subtype":"遠程","tags":["中毒","移動"],"body":"你對**範圍3內**的**一名**單位進行檢定(智+智):\n* 失敗:無效果  \n* 成功:【中毒1】  \n* 大成功:【中毒2】\n【技能結束後】可宣告**消耗** 1 點 **基礎移動**，對**同一目標**再次施放此技能；可重複消耗。"},{"cost":"1","title":"毒孢詭雷","type":"行動","subtype":"自身","tags":["中毒","保留","地標","失去生命","移動"],"body":"在**自身格**的位置**創造** 1 枚**地標**，隨後進入保留。\n\n**保留1**｜持續期間:\n【我方回合結束時】你可使該地標【移動2】，可穿越高地線。\n【解除保留時】地標**範圍1內**的所有單位**失去** 2 點**生命**和【中毒1】，地標格上的**效果雙倍**，隨後移除地標。"},{"cost":"1","title":"不治之症","type":"行動","subtype":"自身","tags":["中毒","保留"],"body":"此卡**進入保留**。\n\n**保留2**｜持續期間:\n* ① 你**範圍2內**的所有敵方單位解除【中毒】**固定為 1 層**(原為 1d意志的一半) \n* ②【我方回合結束時】你**範圍2內**的所有敵方單位**失去**「等同於中毒層數一半」的**生命**；最高 3 點。"},{"cost":"0","title":"混亂打擊","type":"行動","subtype":"近戰","tags":["混亂","失去生命","移動"],"body":"此技能需要你處於【混亂】才可施放。\n鎖定**範圍2內**最近的一名單位，朝其【移動1】，對目標進行檢定(技+技)，若**範圍1內沒有可檢定單位**則改為**對自己**進行檢定:\n* 失敗:**失去** 1 點**生命**  \n* 成功:**失去** 2 點**生命**  \n* 大成功:**失去** 4 點**生命**"},{"cost":"1","title":"混淆心神","type":"行動","subtype":"混合","tags":["混亂","修正"],"body":"你對**範圍3內**的**一名**其他單位進行檢定(技+智)；此技能檢定修正 + (3-X)；X = 你與目標的距離:\n* 失敗:無效果\n* 成功:【混亂】 \n* 大成功:【混亂】並立刻觸發**混亂打擊**"},{"cost":"1","title":"挑撥囁語","type":"行動","subtype":"遠程","tags":["混亂","優勢"],"body":"你使**範圍3**內陷入【混亂】的一名其他單位發動**混亂打擊**並由你鎖定(可鎖定地塊)，且該**混亂打擊**的檢定**優勢+1**。"},{"cost":"1","title":"清醒點!","type":"行動","subtype":"近戰","tags":["暈眩","混亂","優勢","失去生命"],"body":"你對範圍1內的一名單位進行檢定(技+技)；若目標處於【混亂】，解除其【混亂】，此技能檢定附加 1 顆**你的技巧骰**且**優勢 +1**：\n* 失敗:無效果\n* 成功:  【暈眩】\n* 大成功:【暈眩】且**失去** 2 點**生命**"},{"cost":"2","title":"精神控制","type":"行動","subtype":"遠程","tags":["混亂","保留","移動"],"body":"你對**範圍3內**陷入【混亂】的**一名其他單位**施放，隨後進入保留。\n\n**保留2**｜持續期間:\n①目標的**混亂打擊**改由你**鎖定**（可鎖定地塊），且**移動與範圍 +2**。\n②其檢定擲骰改用你的(智+智)。\n③目標解除【混亂】需**額外消耗** 1 點 **COST**。\n【目標死亡或解除混亂時】**解除保留**。"},{"cost":"2","title":"菌入膏肓","type":"行動","subtype":"遠程","tags":["混亂","保留","失去生命","臨時生命"],"body":"你對**範圍3內**陷入【混亂】的**一名其他單位**施放，隨後進入保留。\n\n**保留2**｜持續期間:\n* ①目標因【混亂】施放的混亂打擊，額外施放一次。\n* ②目標**每次**施放**混亂打擊**後,**失去** 1 點**生命**,**無視臨時生命**  \n* ③目標的【混亂】需**額外消耗** 1 點 COST 解除\n【目標死亡或解除混亂時】**解除保留**。"},{"cost":"2","title":"菌絲秘境","type":"行動","subtype":"自身","tags":["混亂","疲憊","保留","移動"],"body":"此卡**進入保留**。\n\n**保留2**｜持續期間:\n①**範圍2內**的所有單位陷入【混亂】與【疲憊】；其【混亂】**不會自動施放混亂打擊**（仍可被其他效果觸發或操控）。\n②**範圍2內**的所有單位**基礎移動消耗 +1**。\n（離開範圍即解除）\n\n*讓我們一同享受，這如幻似夢的美好*"},{"cost":"1","title":"以太射線","type":"行動","subtype":"遠程","tags":["震撼","失去生命"],"body":"你對**範圍3內**的**一名**單位進行檢定(智+智):\n* 失敗:無效果 \n* 成功:【震撼】  \n* 大成功:【震撼】 且**失去** 2 點**生命**"},{"cost":"2","title":"以太聚能炮","type":"行動","subtype":"遠程","tags":["伏倒","踉蹌","震撼","優勢"],"body":"你對**範圍4內**的**一名**單位進行檢定(智+智):\n你可在**擲骰前**宣告額外**消耗** 1 點 **COST** 使此技能**優勢 + 1**；可重複消耗。\n* 失敗:【震撼】  \n* 成功:【震撼】 且【踉蹌】\n* 大成功:【震撼】且【伏倒】"},{"cost":"1","title":"震撼腦髓","type":"行動","subtype":"遠程","tags":["震撼","優勢","失去生命"],"body":"你對**範圍3內**的一名單位進行檢定(智+智)；若目標處於【震撼】，解除其【震撼】，此技能檢定附加 1 顆**你的技巧骰**且**優勢 +1**：\n* 失敗:無效果 \n* 成功:**失去** 2 點**生命** \n* 大成功:**失去** 5 點**生命**"},{"cost":"1","title":"以太餘震","type":"反應","subtype":"自身","tags":["震撼","保留","遺忘"],"body":"當你對一名單位造成【震撼】後，選擇該目標**公開區**的 1 張卡牌，將其【遺忘】，可宣告進入保留。\n\n**保留2**｜持續期間:\n被你【遺忘】的那張技能卡**無法回憶**。"},{"cost":"1","title":"腦震盪","type":"反應","subtype":"自身","tags":["暈眩","踉蹌","保留","劣勢"],"body":"當你造成【暈眩】的單位**宣告解除**【暈眩】時，其陷入【踉蹌】，隨後進入保留。\n\n**保留1**｜持續期間:\n目標所有**擲骰劣勢 +1**。\n【我方回合開始時】**解除保留**。"},{"cost":"0","title":"注意力不集中","type":"祕密","subtype":"自身","tags":["恢復COST","遺忘"],"body":"當你**公開區**的卡牌【遺忘】時，可**揭露**此卡：\n你**恢復** 1 點 **COST**,此卡代替該卡被【遺忘】。"},{"cost":"1","title":"落葉借勢","type":"反應","subtype":"自身","tags":["優勢"],"body":"當你【進行檢定時】 → 可使其**優勢 +1**。\n\n若此技能卡在**公開區**，可不消耗 COST 發動，隨後必須**收回此卡**。"},{"cost":"1","title":"刺探步","type":"行動","subtype":"近戰","tags":["優勢","移動"],"body":"你朝**範圍2內**的一名單位【移動1】，隨後進行檢定(技+技) :\n* 失敗:你【移動1】  \n* 成功:本回合**下一次**對**同一目標**的檢定**優勢 + 2**  \n* 大成功:同上且附加 1 顆**你的技巧骰**\n【技能結束後】可**收回此卡**,而非留在**公開區**"},{"cost":"1","title":"詭距刺擊","type":"行動","subtype":"近戰","tags":["失去生命"],"body":"你對**範圍1內**的**一名**單位進行檢定(技+技);你可宣告**額外消耗** 1 點 **COST**,使此技能的**範圍 +1** 且**火線改為混合**:\n* 失敗:**失去** 1 點**生命**\n* 成功:**失去** 3 點**生命**\n* 大成功:**失去** 5 點**生命**"},{"cost":"1","title":"聚影雷標","type":"行動","subtype":"遠程","tags":["失去生命","移動"],"body":"你對**範圍 2 內**的**一名**單位進行檢定(智+智);可宣告**消耗** 1 點**基礎移動**使此技能**範圍 +1**;可重複消耗:\n* 失敗:**失去** 1 點**生命**\n* 成功:**失去** 2 點**生命**\n* 大成功:**失去** 4 點**生命**"},{"cost":"1","title":"亂戰漫遊","type":"行動","subtype":"自身","tags":["移動"],"body":"你【移動1】;移動後若你**範圍 2 內**有**兩名以上**的**其他單 <script>
var CARDS=(window.CARDS||[]), VOCAB=(window.VOCAB||{});
var model=buildFilterModel(CARDS, VOCAB);
var sel={type:{},fire:{},status:{},mech:{}};

document.getElementById('fgroups').innerHTML=model.groups.map(function(g){
  return '<div class="frow"><span class="lbl">'+esc(g.label)+'</span><span class="chips">'+
    g.chips.map(function(ch){return '<button class="chip" data-dim="'+g.dim+'" data-val="'+esc(ch.val)+'">'+esc(ch.val)+'<span class="c">'+ch.count+'</span></button>';}).join('')+
    '</span></div>';
}).join('');

function fitReading(){
  Array.prototype.forEach.call(document.querySelectorAll('.cb-body'),function(el){
    var fs=15; el.style.fontSize=fs+'px';
    var g=160;
    while(el.scrollHeight>el.clientHeight+0.5 && fs>9 && g-->0){ fs-=0.3; el.style.fontSize=fs+'px'; }
  });
}
function renderReading(list){
  var stage=document.getElementById('stage');
  if(!list.length){ stage.innerHTML='<div id="empty">沒有符合篩選的卡</div>'; }
  else { stage.innerHTML=list.map(function(c){var o={};for(var k in c)o[k]=c[k];o.artH=0;return card(o);}).join(''); }
  document.getElementById('count').textContent='共 '+list.length+' 張';
  fitReading();
}
function applyFilter(){ renderReading(CARDS.filter(function(c){return cardPasses(c, sel, model.sets);})); }

document.getElementById('filters').addEventListener('click',function(e){
  var b=e.target.closest('.chip'); if(!b)return;
  var dim=b.getAttribute('data-dim'), val=b.getAttribute('data-val');
  if(sel[dim][val])delete sel[dim][val]; else sel[dim][val]=1;
  b.classList.toggle('on'); applyFilter();
});
document.getElementById('fclear').addEventListener('click',function(){
  sel={type:{},fire:{},status:{},mech:{}};
  Array.prototype.forEach.call(document.querySelectorAll('#filters .chip.on'),function(c){c.classList.remove('on');});
  applyFilter();
});
(function(){var f=document.getElementById('filters'),t=document.getElementById('ftoggle');
  function arr(){t.textContent=f.classList.contains('collapsed')?'篩選 ▾':'篩選 ▴';}
  t.addEventListener('click',function(){f.classList.toggle('collapsed');arr();});
  if(matchMedia('screen and (max-width:820px)').matches)f.classList.add('collapsed');
  arr();
})();

applyFilter();
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fitReading);
